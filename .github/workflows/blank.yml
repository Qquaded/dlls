# .github/workflows/build-gns-mac.yml
name: Build GNS macOS

on: [push, workflow_dispatch]

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: arm64
            runs-on: macos-latest
          - arch: x86_64
            runs-on: macos-13  # last Intel runner
    
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ValveSoftware/GameNetworkingSockets

      - name: Install dependencies
        run: brew install cmake ninja protobuf openssl@3

      - name: Build
        run: |
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIB=ON \
            -DBUILD_STATIC_LIB=OFF \
            -DUSE_CRYPTO=OpenSSL \
            -DProtobuf_USE_STATIC_LIBS=ON \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            ..
          ninja

      - uses: actions/upload-artifact@v4
        with:
          name: gns-macos-${{ matrix.arch }}
          path: build/bin/libGameNetworkingSockets.dylib

  universal:
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: gns-macos-arm64
          path: arm64

      - uses: actions/download-artifact@v4
        with:
          name: gns-macos-x86_64
          path: x86_64

      - name: Combine with lipo
        run: |
          lipo -create \
            arm64/libGameNetworkingSockets.dylib \
            x86_64/libGameNetworkingSockets.dylib \
            -output libGameNetworkingSockets.dylib
          lipo -info libGameNetworkingSockets.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: libGameNetworkingSockets-macos-universal
          path: libGameNetworkingSockets.dylib
